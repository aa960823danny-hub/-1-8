<style>
:root {
  --bg:#f6f3ee; --paper:#fffdf9; --ink:#1f2937; --muted:#6b7280; --line:#e7dfd4;

*{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;font-family:"Microsoft JhengHei","Noto Sans TC",Inter,system-ui,sans-serif;background:radial-gradient(circle at top left,#fff7ed 0,#f7f3ee 35%,#eef3f8 100%);color:var(--ink);}
.app{min-height:100vh;display:grid;grid-template-columns:300px 1fr;}
.sidebar{position:sticky;top:0;height:100vh;background:#182536;color:#f8fafc;padding:18px;display:flex;flex-direction:column;gap:16px;overflow:auto;box-shadow:10px 0 30px rgba(15,23,42,.12)}
.logo{padding:18px;border:1px solid rgba(255,255,255,.12);border-radius:20px;background:linear-gradient(135deg,#22344d,#101827)} .logo h1{font-size:18px;margin:0 0 6px} .logo p{font-size:12px;color:#cbd5e1;margin:0;line-height:1.5}
.nav{display:flex;flex-direction:column;gap:8px} .nav button{text-align:left;border:0;border-radius:16px;padding:12px 14px;background:transparent;color:#cbd5e1;cursor:pointer;transition:.2s;font-weight:700} .nav button:hover{background:rgba(255,255,255,.08);color:#fff} .nav button.active{background:#f8fafc;color:#172033;box-shadow:var(--shadow)} .nav small{display:block;font-weight:500;color:#94a3b8;margin-top:2px} .nav button.active small{color:#667085}
.main{min-width:0} .topbar{position:sticky;top:0;z-index:20;backdrop-filter:blur(14px);background:rgba(255,253,249,.78);border-bottom:1px solid var(--line);padding:16px 26px;display:flex;align-items:center;justify-content:space-between;gap:16px} .title h2{margin:0;font-size:22px;letter-spacing:-.02em} .title a{font-size:13px;color:var(--brand);font-weight:700;text-decoration:none}
.controls{display:flex;gap:10px;flex-wrap:wrap} button,.chip{font-family:inherit} .btn{border:1px solid var(--line);background:#fff;padding:10px 14px;border-radius:999px;cursor:pointer;font-weight:800;color:#334155;transition:.18s} .btn:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(0,0,0,.08)} .btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.content{max-width:1220px;margin:0 auto;padding:28px} .hero{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;margin-bottom:18px} .panel{background:rgba(255,253,249,.92);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px} .panel h3{margin:0 0 14px;font-size:18px} .intro{font-size:15px;line-height:1.9;color:#374151;text-align:justify}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px} .stat{background:#f8fafc;border:1px solid #e2e8f0;border-radius:18px;padding:15px} .stat b{display:block;font-size:26px;color:var(--brand)} .stat span{font-size:12px;color:var(--muted);font-weight:700}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 18px} .tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;font-weight:900;cursor:pointer;color:#64748b} .tab.active{background:#172033;color:#fff;border-color:#172033}
.section{display:none} .section.active{display:block} .toolbar{display:grid;grid-template-columns:1fr auto auto;gap:12px;margin-bottom:18px} .search{border:1px solid var(--line);border-radius:999px;padding:12px 16px;font-size:15px;background:#fff;min-width:0}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px} .card{min-height:280px;perspective:1000px} .card-inner{position:relative;width:100%;height:100%;min-height:280px;transition:transform .35s;transform-style:preserve-3d} .card.flipped .card-inner{transform:rotateY(180deg)} .face{position:absolute;inset:0;backface-visibility:hidden;border:1px solid var(--line);border-radius:22px;background:#fff;box-shadow:var(--shadow);padding:20px;display:flex;flex-direction:column} .front{align-items:center;justify-content:center;text-align:center;background:linear-gradient(180deg,#fff,#f8fbff)} .back{transform:rotateY(180deg);overflow:auto;background:#fffdf8} .word{font-size:28px;font-weight:950;color:var(--brand);line-height:1.15} .pos{font-size:12px;color:#64748b;background:#eef2f7;border-radius:999px;padding:4px 9px;margin-top:8px;font-weight:800} .card-actions{display:flex;gap:8px;margin-top:18px} .iconbtn{border:0;border-radius:999px;background:#e8f2ff;color:#1d4ed8;padding:9px 12px;cursor:pointer;font-weight:900} .hint{font-size:12px;color:#94a3b8;margin-top:16px} .zh{font-size:20px;font-weight:950;color:#0f5132;border-left:5px solid #22c55e;padding-left:10px;margin-bottom:10px} .def,.ex,.memo{font-size:14px;line-height:1.65;color:#374151;margin:8px 0} .ex{background:#f8fafc;border-left:4px solid #60a5fa;border-radius:12px;padding:10px} .memo{background:#fff7ed;border:1px dashed #fdba74;border-radius:14px;padding:11px;color:#9a3412}
.synant{font-size:13px;line-height:1.55;background:#f0f7ff;border:1px solid #dbeafe;border-radius:14px;padding:10px;margin:8px 0;color:#1e3a8a}.synant b{color:#1d4ed8}.synant .anti b{color:#b91c1c}.synant .anti{display:block;margin-top:5px;color:#7f1d1d}
 .tagrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px} .tag{font-size:11px;padding:3px 7px;border-radius:999px;background:#f1f5f9;color:#64748b;font-weight:800}
.ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px} .ref{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px} .ref b{color:var(--brand2)} .ref p{font-size:13px;line-height:1.7;color:#475569}
.quiz-list{display:grid;gap:16px} .q{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 8px 24px rgba(43,38,32,.05)} .q h4{margin:0 0 12px;line-height:1.55} .opt{display:block;width:100%;text-align:left;border:1px solid #e5e7eb;background:#fff;border-radius:14px;margin:8px 0;padding:11px 13px;cursor:pointer;color:#374151} .opt.revealed.correct{background:#dcfce7;border-color:#22c55e;color:#14532d;font-weight:900} .opt.revealed.wrong{background:#fee2e2;border-color:#ef4444;color:#7f1d1d} .answer{display:none;margin-top:10px;background:#f8fafc;border-radius:14px;padding:12px;color:#334155;line-height:1.7} .answer.show{display:block}
.studybar{position:fixed;right:18px;bottom:18px;background:#172033;color:#fff;border-radius:18px;padding:12px 14px;box-shadow:var(--shadow);display:flex;gap:10px;align-items:center;z-index:50} .studybar button{background:#fff;color:#172033;border:0;border-radius:999px;padding:9px 12px;font-weight:900;cursor:pointer}
.hidden-zh .zh,.hidden-zh .memo,.hidden-zh .answer{filter:blur(8px);user-select:none} .hidden-zh .zh:hover,.hidden-zh .memo:hover,.hidden-zh .answer:hover{filter:none}
@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.hero{grid-template-columns:1fr}.topbar{position:relative;align-items:flex-start;flex-direction:column}.toolbar{grid-template-columns:1fr}}
@media print{.sidebar,.topbar,.studybar,.tabs,.toolbar{display:none!important}.app{display:block}.section{display:block!important}.panel,.face,.q,.ref{box-shadow:none;break-inside:avoid}body{background:white}}

<script id="data" type="application/json">[{"id": "group1", "title": "How to Shake - Tipsy Bartender Course", "link": "https://youtu.be/b1J-ahmJST0", "intro": "The video introduces how to shake a drink properly and why this step is important in making beverages. It explains that shaking not only mixes ingredients but also chills the drink and improves its flavor. The presenter demonstrates how to hold the shaker and shake it with a steady rhythm, making the process look smooth and controlled. It also shows that shaking is especially useful when combining ingredients that do not mix easily, such as juice and alcohol. Overall, the video provides useful and practical guidance for beginners.", "vocab": [{"word": "dilute", "pos": "v.", "zh": "稀釋", "definition": "To make a liquid thinner or weaker by adding water or another liquid to it.", "example": "You shake a drink to chill it and dilute it at the same time.", "mnemonic": "di (away, 離開) + lute (wash, 洗) → 把濃稠度洗掉、沖淡 → 稀釋 。", "type": "core", "synonyms": ["weaken", "thin", "water down"], "antonyms": ["concentrate", "strengthen", "intensify"]}, {"word": "frothy", "pos": "adj.", "zh": "起泡的", "definition": "Full of or covered with a mass of small bubbles.", "example": "Drinks that you want to be frothy or foamy, like those with cream or eggs, must be shaken.", "mnemonic": "froth（泡沫）+ y（形容詞尾）。聯想卡布奇諾表面的細緻奶泡。", "type": "core", "synonyms": ["foamy", "bubbly", "effervescent"], "antonyms": ["flat", "still", "bubble-free"]}, {"word": "tempered", "pos": "adj.", "zh": "鋼化的、強化處理的", "definition": "(Of glass) treated with heat or chemicals to increase its strength and safety.", "example": "This is tempered glass; if it breaks, it doesn't slice you up the way a regular piece of glass would.", "mnemonic": "temper（鍛鍊、調質）+ ed → 經過高溫鍛鍊過的 強化安全玻璃 。", "type": "core", "synonyms": ["strengthened", "treated", "hardened"], "antonyms": ["untreated", "fragile", "unhardened"]}, {"word": "agitate", "pos": "v.", "zh": "搖動、劇烈攪動", "definition": "To shake or move something briskly or with force.", "example": "The goal is to get the ice to go back and forth and really agitate the ingredients to get them to mix up.", "mnemonic": "ag (act, 行動) + itate (反覆做) → 讓物體反覆處於快速運動狀態 → 劇烈搖晃 。", "type": "core", "synonyms": ["shake", "stir", "disturb"], "antonyms": ["calm", "settle", "soothe"]}, {"word": "flair", "pos": "n.", "zh": "風格、才華", "definition": "A special or instinctive aptitude or stylishness in doing something.", "example": "This is your time to shine and show your personal flair while shaking.", "mnemonic": "諧音「飛兒」→ 展現才華與天賦時整個人像要飛起來一樣富有 獨特風格 。", "type": "core", "synonyms": ["talent", "style", "aptitude"], "antonyms": ["clumsiness", "dullness", "awkwardness"]}, {"word": "junction", "pos": "n.", "zh": "接合處、交叉路口", "definition": "A point where two or more things are joined or meet.", "example": "Tap the shaker right in the junction where the glass and the tin begin to separate.", "mnemonic": "junc (join, 結合) + tion → 東西交接、會合的點 → 接合處、交流道 。", "type": "core", "synonyms": ["intersection", "crossroads", "connection point"], "antonyms": ["separation", "dead end", "division"]}, {"word": "hygienic", "pos": "adj.", "zh": "衛生的", "definition": "Conducive to maintaining health and preventing disease, especially by being clean.", "example": "Some might ask if using the mixing glass to strain the drink instead of a tool is hygienic .", "mnemonic": "源自希臘健康女神 Hygeia（海吉亞）→ 保持乾淨防病的 → 衛生的 。", "type": "core", "synonyms": ["sanitary", "clean", "sterile"], "antonyms": ["unsanitary", "dirty", "contaminated"]}, {"word": "frowned upon", "pos": "v. phr.", "zh": "不贊成、反對", "definition": "To be disapproved of or viewed with dissatisfaction.", "example": "Straining with a mixing glass is frowned upon in professional bartending, but it works in a pinch.", "mnemonic": "frown（皺眉）+ upon → 對某種行為皺眉頭 → 不贊成、反對 。", "type": "core", "synonyms": ["disapproved of", "discouraged", "condemned"], "antonyms": ["approved of", "encouraged", "accepted"]}, {"word": "vacuum", "pos": "n.", "zh": "真空 (密封)", "definition": "A space or seal created by a decrease in air pressure.", "example": "The coldness is going to create a nice vacuum seal, sticking the two pieces together.", "mnemonic": "vacu (empty, 空的) + um → 空無一氣的密封狀態 → 真空 。", "type": "core", "synonyms": ["empty space", "void", "sealed space"], "antonyms": ["fullness", "filled space", "pressure-filled area"]}], "refs": [{"term": "Boston shaker 波士頓雪克杯", "desc": "A two-piece bartending tool consisting of a metal tin and a mixing glass used for shaking drinks."}, {"term": "Hawthorne strainer 霍桑濾網", "desc": "A tool with a spring-like spiral that fits onto a mixing tin to filter out ice and solids."}, {"term": "Cobbler shaker 三段式雪克杯", "desc": "A common home-bar shaker consisting of three parts: a mixing tin, a built-in strainer, and a small cap."}, {"term": "Spirit forward 烈酒導向(的調酒)", "desc": "Drinks primarily made of spirits (e.g., Negroni, Old Fashioned) which should be stirred rather than shaken."}, {"term": "Mixing tin 搖酒不鏽鋼杯", "desc": "The metal container part of a shaker where ingredients and ice are combined for mixing."}, {"term": "Carbonated 含碳酸的", "desc": "Refers to drinks that contain dissolved carbon dioxide gas (bubbles), which should not be shaken."}, {"term": "Triple sec 橙皮甜酒", "desc": "A type of strong, sweet, and colorless orange-flavored liqueur used as an ingredient in cocktails."}], "mcq": [{"question": "1. What is the primary purpose of shaking a cocktail as opposed to stirring it?", "options": [{"text": "(A) To heat up the ingredients.", "correct": false}, {"text": "(B) To chill, dilute, and properly mix ingredients like citrus and cream. (正確答案)", "correct": true}, {"text": "(C) To remove the carbonation from a drink.", "correct": false}, {"text": "(D) To layer different densities of alcohol.", "correct": false}]}, {"question": "2. Which of the following types of drinks should typically NOT be shaken?", "options": [{"text": "(A) Margaritas.", "correct": false}, {"text": "(B) Daiquiris.", "correct": false}, {"text": "(C) Carbonated or spirit-forward drinks like Negronis. (正確答案)", "correct": true}, {"text": "(D) Drinks containing egg whites.", "correct": false}]}, {"question": "3. Why does the host express a preference for the Boston shaker over the cobbler shaker?", "options": [{"text": "(A) The cobbler shaker pieces can stick together when they get cold and wet. (正確答案)", "correct": true}, {"text": "(B) The Boston shaker is cheaper to buy.", "correct": false}, {"text": "(C) The cobbler shaker does not hold enough ice.", "correct": false}, {"text": "(D) The Boston shaker is easier to clean in a dishwasher.", "correct": false}]}, {"question": "4. What safety precaution should you take when shaking a cocktail in a Boston shaker?", "options": [{"text": "(A) Hold the shaker at arm's length at all times.", "correct": false}, {"text": "(B) Always point the glass piece away from you.", "correct": false}, {"text": "(C) Keep the glass piece facing towards you so the drink spills on you rather than others if it separates. (正確答案)", "correct": true}, {"text": "(D) Only shake for a maximum of 5 seconds to prevent the glass from shattering.", "correct": false}]}, {"question": "5. When a Boston shaker is stuck due to a vacuum seal, where is the best place to tap it to separate the pieces?", "options": [{"text": "(A) At the very bottom of the metal tin.", "correct": false}, {"text": "(B) At the junction where the glass and tin begin to separate. (正確答案)", "correct": true}, {"text": "(C) On the rim of the glass.", "correct": false}, {"text": "(D) By banging the entire shaker against the bar top.", "correct": false}]}, {"question": "6. If you do not have a Hawthorne strainer, what does the host suggest as an alternative?", "options": [{"text": "(A) Using a paper towel over the opening.", "correct": false}, {"text": "(B) Placing the mixing glass into the mixing tin to create a gap for straining. (正確答案)", "correct": true}, {"text": "(C) Freezing the drink solid before pouring.", "correct": false}, {"text": "(D) Using a common kitchen colander.", "correct": false}]}], "openq": [{"question": "Q1: After watching the video, do you think shaking a drink properly could change your experience of it? Why or why not? Have you ever had a drink that felt different because of how it was made?", "answer": "參考回答： Yes, I think shaking a drink properly can change the overall experience. From the video, I learned that shaking is not just about mixing ingredients, but also about chilling the drink and creating the right texture. This can affect how smooth and refreshing the drink feels. I remember once I had two similar drinks, but one tasted much better. I think it might be because it was made more carefully, possibly with better technique. After watching this video, I realize that small details like shaking can actually make a big difference in taste and quality."}, {"question": "Q2: Do you think presentation (like how a drink is shaken) affects how much you enjoy it? Why?", "answer": "參考回答： Yes, I think presentation does affect how much I enjoy a drink. When a drink is made in a professional and skillful way, it creates a better overall experience. For example, watching someone shake a drink confidently can make it feel more special and well-prepared. Also, good presentation can make me expect the drink to taste better, which actually influences how I feel when I drink it. So even though the taste is important, the way the drink is prepared and presented also plays a big role in my enjoyment."}]}, {"id": "group2", "title": "The Sudden, Unexpected Visitor - Panic Attack", "link": "https://www.youtube.com/watch?v=74_TedTalk", "intro": "Our video aims to introduce a sensation called a panic attack. Many people misconstrue it as a life-threatening situation. However, unlike a heart attack or stroke, a panic attack doesn't cause long-term physical harm. It is actually an overreaction inside our bodies when facing the perception of danger. What's more, this is also a more common state that may come across some of us in our daily lives. Nowadays, besides the medicines, some treatments like controlling breathing patterns and changing some incorrect beliefs during exposure to the cases are also available. All in all, knowing these practices is necessary to de-escalate the panic. Recognizing panic attacks is the first step in dealing with them, and whether you are the person involved or the witness, it is essential to have awareness in mind.", "vocab": [{"word": "physiological", "pos": "adj.", "zh": "生理上的", "definition": "Related to the normal functions and processes of the body.", "example": "Stress can cause physiological changes like sweating and a faster heartbeat.", "mnemonic": "physio (body/nature, 身體或物理) + logical (邏輯的) → 身體正常運作邏輯的 → 生理上的 。", "type": "core", "synonyms": ["bodily", "physical", "biological"], "antonyms": ["psychological", "mental", "emotional"]}, {"word": "adrenaline", "pos": "n.", "zh": "腎上腺素", "definition": "A hormone released in stressful or exciting situations.", "example": "I felt a rush of adrenaline before speaking in front of the class.", "mnemonic": "ad (near, 靠近) + renal (kidney, 腎臟) + ine (生化素) → 靠近腎臟上方腺體分泌的荷爾蒙 → 腎上腺素 。", "type": "core", "synonyms": ["epinephrine", "stress hormone", "fight-or-flight hormone"], "antonyms": ["calmness", "relaxation", "low arousal"]}, {"word": "trigger", "pos": "n./v.", "zh": "誘因、引發", "definition": "Something that causes a strong emotional or physical reaction.", "example": "Loud noises can trigger anxiety for some people.", "mnemonic": "本義為「槍的扳機」。扣動扳機就會引發爆炸 → 延伸為 觸發、誘因 。", "type": "core", "synonyms": ["cause", "spark", "set off"], "antonyms": ["prevent", "stop", "inhibit"]}, {"word": "hyperventilation", "pos": "n.", "zh": "過度換氣", "definition": "Very fast or deep breathing, often caused by stress or panic.", "example": "She experienced hyperventilation during the panic attack.", "mnemonic": "hyper (over/excessive, 超過) + ventilate (換氣、通風) + ion → 呼吸劇烈超過身體所需 → 過度換氣 。", "type": "core", "synonyms": ["overbreathing", "rapid breathing", "excessive breathing"], "antonyms": ["slow breathing", "normal breathing", "breath control"]}, {"word": "lightheadedness", "pos": "n.", "zh": "頭暈、暈眩感", "definition": "A feeling of dizziness or weakness.", "example": "I felt lightheadedness after standing up too quickly.", "mnemonic": "light (輕飄飄) + head (腦袋) + ness → 覺得腦袋輕飄飄、不真實的狀態 → 頭暈、暈眩 。", "type": "core", "synonyms": ["dizziness", "faintness", "wooziness"], "antonyms": ["steadiness", "alertness", "clarity"]}, {"word": "numbness", "pos": "n.", "zh": "麻木、失去知覺", "definition": "A loss of feeling in a part of the body.", "example": "Sitting too long caused numbness in my legs.", "mnemonic": "numb (發麻的) + ness (名詞尾) → 身體部位失去神經知覺的狀態 → 麻木 。", "type": "core", "synonyms": ["loss of feeling", "insensitivity", "deadness"], "antonyms": ["sensation", "sensitivity", "feeling"]}, {"word": "wind down", "pos": "phr.", "zh": "放鬆下來、慢慢平靜", "definition": "To gradually relax after stress or activity.", "example": "I usually listen to music to wind down before bed.", "mnemonic": "wind（給發條上緊弦）。當發條向下（down）釋放時，張力消失 → 平靜、放鬆 。", "type": "core", "synonyms": ["relax", "unwind", "calm down"], "antonyms": ["wind up", "stress out", "intensify"]}, {"word": "relapse", "pos": "n./v.", "zh": "復發", "definition": "A return of symptoms after improvement.", "example": "He worried about a relapse after stopping the medication.", "mnemonic": "re (back, 退回) + lapse (slip, 滑落) → 病情好轉後又再度往下滑落 → 舊病復發 。", "type": "core", "synonyms": ["recurrence", "setback", "return"], "antonyms": ["recovery", "improvement", "remission"]}, {"word": "concrete", "pos": "adj.", "zh": "具體的、明確的", "definition": "Clear and specific rather than general or abstract.", "example": "The teacher gave us concrete examples to explain the idea.", "mnemonic": "與「水泥」同字。想像凝固後摸得到、看得到的固體實物 → 具體的 。", "type": "core", "synonyms": ["specific", "clear", "tangible"], "antonyms": ["abstract", "vague", "general"]}, {"word": "grip", "pos": "n./v.", "zh": "緊握、掌控", "definition": "A firm hold on something.", "example": "She tightened her grip on the handle while riding the bus.", "mnemonic": "聯想 grab（抓取）與 gripe（抱怨/抓緊不放），指手掌或心理上的 強力掌控、抓緊 。", "type": "core", "synonyms": ["hold", "grasp", "control"], "antonyms": ["release", "let go", "loosen"]}, {"word": "instill", "pos": "v.", "zh": "逐漸灌輸、培養", "definition": "To gradually establish an idea or feeling in someone's mind.", "example": "My parents instilled good habits in me when I was young.", "mnemonic": "in (進入) + still (stilla, 滴) → 像液體一樣一滴一滴地滲透進大腦 → 逐漸灌輸、潛移默化 。", "type": "core", "synonyms": ["implant", "cultivate", "impress"], "antonyms": ["remove", "erase", "discourage"]}], "refs": [{"term": "Corset 束腹、束腰", "desc": "A tight-fitting piece of underclothing used to pull in the waist. In context, used as a metaphor to describe the feeling of being unable to breathe during a panic attack."}, {"term": "Profusely 大量地、過度地", "desc": "To a great degree; in large amounts (e.g., sweating profusely)."}, {"term": "Impending doom 即將發生的災難/毀滅感", "desc": "A strong feeling that something terrible is about to happen immediately; a hallmark psychological feature of panic."}, {"term": "Sympathetic nervous system 交感神經系統", "desc": "The part of the nervous system that prepares the body for action during stress (\"fight or flight\")."}, {"term": "Generalized Anxiety Disorder (GAD) 廣泛性焦慮症", "desc": "A disorder characterized by chronic, excessive, and uncontrollable worry about everyday things."}, {"term": "Obsessive-Compulsive Disorder (OCD) 強迫症", "desc": "A disorder where a person has recurring, unwanted thoughts (obsessions) and feels the need to repeat behaviors (compulsions)."}, {"term": "Antidepressant 抗憂鬱藥劑", "desc": "A type of medication used to treat depression and anxiety disorders."}], "mcq": [{"question": "1. According to the text, which part of the brain is responsible for initially perceiving danger and triggering the \"fight or flight\" response?", "options": [{"text": "A) The prefrontal cortex", "correct": false}, {"text": "B) The parasympathetic nervous system", "correct": false}, {"text": "C) The amygdala (正確答案)", "correct": true}, {"text": "D) The spinal cord", "correct": false}]}, {"question": "2. What is the role of acetylcholine during the recovery phase of a panic attack?", "options": [{"text": "A) It increases the heart rate to provide more oxygen to the brain.", "correct": false}, {"text": "B) It stimulates the sympathetic nervous system.", "correct": false}, {"text": "C) It triggers the release of adrenaline.", "correct": false}, {"text": "D) It decreases the heart rate and helps wind down the attack. (正確答案)", "correct": true}]}, {"question": "3. How does Cognitive Behavioral Therapy (CBT) compare to antidepressant medication in terms of \"relapse rate\" according to the article?", "options": [{"text": "A) CBT has a higher relapse rate (50%) than medication (20%).", "correct": false}, {"text": "B) Medication has a lower relapse rate than CBT.", "correct": false}, {"text": "C) CBT has a lower relapse rate (20%) compared to medication (50%). (正確答案)", "correct": true}, {"text": "D) Both have the exact same relapse rate of 40%.", "correct": false}]}, {"question": "4. What does the \"cognitive restructuring\" stage of CBT specifically involve?", "options": [{"text": "A) Using exposure to trigger a panic attack on purpose.", "correct": false}, {"text": "B) Identifying and replacing terrifying thoughts with more accurate ones. (正確答案)", "correct": true}, {"text": "C) Practicing muscle exercises to control physical tension.", "correct": false}, {"text": "D) Taking hormones to balance the sympathetic nervous system.", "correct": false}]}, {"question": "5. Why do people often experience lightheadedness or numbness during a panic attack?", "options": [{"text": "A) Because the body is suffering a minor stroke.", "correct": false}, {"text": "B) Because of permanent damage to the nervous system.", "correct": false}, {"text": "C) Because changes in blood flow are redirecting oxygen to the muscles and brain. (正確答案)", "correct": true}, {"text": "D) Because the prefrontal cortex has stopped functioning entirely.", "correct": false}]}], "openq": [{"question": "Q1: Have you ever experienced a moment where your body reacted strongly to stress or fear? What was that like?", "answer": "參考回答： Yes, I have experienced something like that before. It happened when I had to give an important presentation in front of many people. Before I went on stage, my heart started beating very fast, my hands felt cold and shaky, and I found it hard to breathe normally. At that moment, it felt like I was in danger, even though I knew it was just a presentation. After a few minutes, when I started speaking slowly and tried to calm myself down, my body gradually returned to normal. This experience made me realize how powerful our body's stress response can be."}, {"question": "Q2: Why do you think modern life might increase the chances of experiencing anxiety or panic?", "answer": "參考回答： I think modern life increases anxiety because people are under constant pressure from many different sources. For example, students face academic stress, social expectations, and sometimes uncertainty about their future. Technology also plays a role, because we are always connected and often compare ourselves to others on social media. In addition, people today may not have enough time to rest or relax, which makes stress build up over time. When stress is not properly managed, it can turn into anxiety or even panic. Therefore, the fast pace and high expectations of modern life can make people more vulnerable to these feelings."}]}, {"id": "group3", "title": "Can Saunas Make You Live Longer? - Science of Heat", "link": "https://youtu.be/7c-OXc6H7us", "intro": "This video explores an interesting question: Can using a sauna help people live longer? It starts by introducing a long-term scientific study from Finland, where researchers noticed that people who used saunas more often tended to have better heart health and a lower risk of death. At the beginning, the video explains what happens inside the human body when you sit in a sauna. It describes how the heat makes your heart beat faster, increases blood flow, and causes sweating—reactions that are similar to moderate exercise. The introduction also raises curiosity by suggesting that something as simple as sitting in a hot room might have real health benefits.", "vocab": [{"word": "over the course of", "pos": "phr.", "zh": "在...過程中、在...期間", "definition": "During a period of time.", "example": "Over the course of his career, he has worked in five different places.", "mnemonic": "course 指事情發展的「歷程、路徑」。在整個路徑的上方（over）流動過來 → 在...期間 。", "type": "core", "synonyms": ["during", "throughout", "over"], "antonyms": ["before", "after", "outside the period of"]}, {"word": "therapeutic", "pos": "adj.", "zh": "有療效的、具舒緩特性的", "definition": "Something that helps you relax, feel better, or heal.", "example": "Listening to soft music after a tiring day is very therapeutic.", "mnemonic": "源自名詞 therapy（治療、物理治療）+ utic（形容詞尾）→ 有治療與修復放鬆作用的 → 有療效的 。", "type": "core", "synonyms": ["healing", "soothing", "restorative"], "antonyms": ["harmful", "damaging", "stressful"]}, {"word": "blast", "pos": "n.", "zh": "一陣、強烈衝擊波", "definition": "A sudden, strong hit of air, heat, or sound, feeling like a quick and powerful wave.", "example": "When I opened the oven, a blast of hot air hit my face.", "mnemonic": "像爆炸（blast）時產生的那一股突如其來、威力強大的 熱浪或強風衝擊 。", "type": "core", "synonyms": ["burst", "gust", "surge"], "antonyms": ["trickle", "whisper", "gentle breeze"]}, {"word": "ignites", "pos": "v.", "zh": "引發、點燃", "definition": "To start something, like a fire or a process; to trigger or turn on a reaction.", "example": "This discovery ignites new interest in medical research.", "mnemonic": "ign (fire, 火，如 ignition 點火器) + ite → 本義點燃火焰，在生理醫學中引申為 觸發防禦機制 。", "type": "core", "synonyms": ["triggers", "sparks", "sets off"], "antonyms": ["extinguishes", "stops", "suppresses"]}, {"word": "ticks up", "pos": "v.", "zh": "微增、逐漸上升", "definition": "To increase slightly or gradually.", "example": "Gas prices often begin to tick up as soon as conflict starts in oil-producing regions.", "mnemonic": "tick 是時鐘指針的「滴答微動」。滴答跳動向上（up）→ 指數或數值 輕微地上升 。", "type": "core", "synonyms": ["increases slightly", "rises", "edges up"], "antonyms": ["drops", "decreases", "ticks down"]}, {"word": "coincidence", "pos": "n.", "zh": "巧合", "definition": "Two things happen at the same time by chance, without planning.", "example": "It's probably just a coincidence, but the results look similar.", "mnemonic": "co (together, 一起) + incidence (事件) → 事件在沒有預謀的情況下剛好撞到一塊兒了 → 巧合 。", "type": "core", "synonyms": ["chance event", "accident", "fluke"], "antonyms": ["plan", "intention", "design"]}, {"word": "complement", "pos": "v.", "zh": "相輔相成、補足", "definition": "To match something perfectly so that both look or work better together.", "example": "The blue tie complements his suit perfectly.", "mnemonic": "comple (complete, 完整) + ment → 補上空缺使整體達到完整與完美的狀態 → 相輔相成 。", "type": "core", "synonyms": ["complete", "enhance", "go well with"], "antonyms": ["clash with", "contradict", "undermine"]}, {"word": "summons", "pos": "v.", "zh": "召喚、傳喚", "definition": "To order or call someone to come to a specific place.", "example": "I was summoned to court as a witness to the crime.", "mnemonic": "sub- (secretly/under, 在...下方) + monere (warn/call, 警告/指派) → 下達帶有強制力的命令要求前來 → 召喚 。", "type": "core", "synonyms": ["calls", "orders", "commands"], "antonyms": ["dismisses", "releases", "sends away"]}, {"word": "inflammation", "pos": "n.", "zh": "發炎、紅腫", "definition": "A process where a part of the body becomes red, swollen, and painful as a reaction to injury or infection.", "example": "Ice can help reduce the inflammation in your swollen ankle.", "mnemonic": "in (在內) + flame (火焰) + ation → 體內組織像有火苗在燒一樣紅腫刺痛 → 發炎 。", "type": "core", "synonyms": ["swelling", "irritation", "redness"], "antonyms": ["healing", "calmness", "reduction of swelling"]}, {"word": "paradoxically", "pos": "adv.", "zh": "自相矛盾地、出乎意料地", "definition": "In a way that is surprising because it is the opposite of what you expect.", "example": "Paradoxically, the more he studied, the more confused he became.", "mnemonic": "para- (contrary to, 相反) + doxa (opinion/baseline logic, 常理觀點) → 與正常的常理邏輯推導完全相反地 → 自相矛盾地 。", "type": "core", "synonyms": ["contradictorily", "unexpectedly", "ironically"], "antonyms": ["logically", "predictably", "straightforwardly"]}, {"word": "demographic", "pos": "n.", "zh": "特定人口群組", "definition": "A specific group of people in a population, shared by things like age, gender, or where they live.", "example": "The video game is very popular among the teenage demographic.", "mnemonic": "demo (people, 人民) + graphic (畫、地圖) → 在社會地圖上圈出來的特定受眾群體 → 特定人口群組 。", "type": "core", "synonyms": ["population group", "audience segment", "social group"], "antonyms": ["individual", "single person", "non-group"]}], "refs": [{"term": "Thermoregulatory 體體溫調節", "desc": "The way your body controls its own temperature to stay at a healthy level. (e.g., Sweating is a natural thermoregulatory response to heat.)"}, {"term": "Cardiovascular 心血管的", "desc": "Relating to the heart and blood vessels. Cardiovascular disease is the leading cause of death worldwide."}, {"term": "Enzymes 酵素、酶", "desc": "Chemical substances produced by living cells that cause particular chemical reactions to happen without changing themselves."}, {"term": "Sweat lodges 汗屋", "desc": "A small, covered hut used by Native Americans for a hot steam bath, used to pray and clean their bodies and minds."}, {"term": "Microtears 肌肉微小撕裂", "desc": "Very small injuries or rips in a tissue that you can only see with a microscope, causing soreness after a run."}], "mcq": [{"question": "1. When we enter a sauna, the blast of dry heat ignites our body's thermoregulation response. Regarding this phenomenon, which of the following is true?", "options": [{"text": "(A) Our breathing rate decreases so that the body can conserve energy and reduce sweating.", "correct": false}, {"text": "(B) Our body temperature immediately drops below normal within a few seconds after entering the sauna.", "correct": false}, {"text": "(C) Our blood vessels widen, and the heart rate ticks up to circulate blood faster. (正確答案)", "correct": true}, {"text": "(D) Our blood vessels narrow, causing blood flow to slow down and body temperature to rise further.", "correct": false}]}, {"question": "2. Inflammation is a natural phase in the healing process, but what consequences might excessive inflammation cause?", "options": [{"text": "(A) Paradoxically slow the recovery process (正確答案)", "correct": true}, {"text": "(B) Strengthen the immune system", "correct": false}, {"text": "(C) Reduce pain and swelling completely", "correct": false}, {"text": "(D) Speed up tissue repair", "correct": false}]}, {"question": "3. Which of the following statements about the benefits of saunas is incorrect?", "options": [{"text": "(A) Blood flow increased, which can help pump in the biological ingredients needed to rebuild and help pump out waste.", "correct": false}, {"text": "(B) Regulate inflammatory damage accumulated by cells as we age.", "correct": false}, {"text": "(C) Regular sauna users tend to have higher levels of heat shock proteins.", "correct": false}, {"text": "(D) Saunas immediately eliminate all toxins from the body and completely prevent aging. (正確答案)", "correct": true}]}, {"question": "4. Regarding \"heat shock proteins,\" which of the following is incorrect?", "options": [{"text": "(A) Safeguard our cells by repairing damaged DNA.", "correct": false}, {"text": "(B) Monitoring when important enzymes aren't functioning properly.", "correct": false}, {"text": "(C) Heat shock proteins permanently stop cells from aging or dying. (正確答案)", "correct": true}, {"text": "(D) Regular sauna users tend to have higher levels of these proteins.", "correct": false}]}, {"question": "5. Based on the video, can saunas help people live longer?", "options": [{"text": "(A) Yes, regular sauna use may improve overall health and potentially longer lifespan.", "correct": false}, {"text": "(B) It's not yet possible to declare a true cause and effect between saunas and health. (正確答案)", "correct": true}, {"text": "(C) No, saunas have no effect on the human body.", "correct": false}, {"text": "(D) No, because the health benefits of saunas only last for a few minutes and have no long-term effects on the body.", "correct": false}]}], "openq": [{"question": "Q1: Saunas appear in many different cultures. Do you think a tradition can last for such a long time because it is scientifically proven, or because of people's experiences and beliefs? Why?", "answer": "參考回答： I think traditions like saunas last for a long time mainly because of people's experiences and beliefs rather than scientific proof. Long before science could explain anything, people relied on how they felt. If something made them feel relaxed or healthier, they continued doing it and passed it down through generations."}, {"question": "Q2: The video mentions that it is still unclear whether saunas have a direct impact on health. Would you still be willing to try a sauna? Why or why not?", "answer": "參考回答： Yes, I would still be willing to try a sauna. Even though it is not certain whether saunas have a direct impact on health, they seem to help people relax and reduce stress. In modern life, stress relief is already very valuable."}]}, {"id": "group4", "title": "The Language of Lying - Noah Zandan (TED)", "link": "https://youtu.be/H0-WkpmTPrM", "intro": "One of the most interesting things about human communication is that people do not always tell the truth. In the TED Talk \"The Language of Lying\" by Noah Zandan, the speaker explains how lies can often be detected through the language people use rather than through physical reactions like nervousness or sweating. Instead of focusing on tools such as polygraphs or brain scanners, Zandan introduces the idea of linguistic analysis, which studies patterns in communication to identify deception. What caught our attention about this talk is how ordinary lying actually is. From small excuses like \"my phone died\" to serious public scandals, lying appears in everyday life more often than we realize. The speaker explains that liars usually avoid self-references, use more negative words, keep explanations simple, and often make their sentences unnecessarily long in order to sound convincing. These patterns reveal how the brain struggles to create false stories naturally. As college students, we found this topic both practical and eye-opening because communication plays such a huge role in our daily interactions, whether in friendships, relationships, social media, or even academic settings.", "vocab": [{"word": "admissible", "pos": "adj.", "zh": "可容許的、法庭容許的", "definition": "Considered satisfactory and acceptable, especially in court.", "example": "The judge ruled that new evidence was admissible .", "mnemonic": "ad- (to) + mit (send, 送入) + ible (可...的) → 允許被當作合規材料送進法庭檔案的 → 可容許的 。", "type": "core", "synonyms": ["acceptable", "allowable", "valid"], "antonyms": ["inadmissible", "unacceptable", "invalid"]}, {"word": "spur", "pos": "v.", "zh": "促進、驅使、激勵", "definition": "To encourage an activity or development or make it happen faster.", "example": "Rising consumer sales have the effect of spurring the economy to faster growth.", "mnemonic": "本義為騎馬時靴子後方的「馬刺」。用馬刺去戳馬腹藉以快馬加鞭 → 促進、激勵 。", "type": "core", "synonyms": ["encourage", "stimulate", "prompt"], "antonyms": ["discourage", "hinder", "restrain"]}, {"word": "qualitatively", "pos": "adv.", "zh": "品質上地、性質上地", "definition": "In a way that relates to how good or bad something is, or its inherent traits.", "example": "The successive levels differ qualitatively .", "mnemonic": "quality（品質、特質）+ ative + ly → 強調本質結構而非數值多寡的 → 性質上地 。", "type": "core", "synonyms": ["in nature", "in character", "by quality"], "antonyms": ["quantitatively", "numerically", "by amount"]}, {"word": "subconscious", "pos": "adj.", "zh": "潛意識的、下意識的", "definition": "The part of your mind that notices and remembers information when you are not actively trying to do so.", "example": "Such memories exist only at the subconscious level.", "mnemonic": "sub (under, 下方) + conscious (有意識的) → 埋藏在顯性主動意識下方的冰山層 → 潛意識的 。", "type": "core", "synonyms": ["unconscious", "implicit", "automatic"], "antonyms": ["conscious", "deliberate", "aware"]}, {"word": "convoluted", "pos": "adj.", "zh": "繁複費解的、冗長盤繞的", "definition": "Sentences or explanations are unreasonably long and difficult to understand.", "example": "His grammar explanations are terribly convoluted .", "mnemonic": "con (together, 一起) + volut (roll, 捲/繞) → 東西被密密麻麻地揉捏捲繞在一塊兒 → 繁複費解的 。", "type": "core", "synonyms": ["complicated", "twisted", "intricate"], "antonyms": ["simple", "clear", "straightforward"]}, {"word": "proclaim", "pos": "v.", "zh": "宣布、宣告", "definition": "To announce something publicly or officially, especially something positive.", "example": "All the countries have proclaimed their loyalty to the alliance.", "mnemonic": "pro (forward, 向前) + claim (shout, 大喊) → 面向前方群眾高聲大喊 → 正式宣布、公告 。", "type": "core", "synonyms": ["announce", "declare", "pronounce"], "antonyms": ["conceal", "hide", "withhold"]}, {"word": "bizarre", "pos": "adj.", "zh": "怪誕的、奇異的", "definition": "Very strange and unusual.", "example": "I heard a bizarre noise coming from the kitchen at midnight.", "mnemonic": "聯想集市（bazaar）中充滿了各種各樣聞所未聞、極度古怪新奇的小玩意兒 → 怪誕的 。", "type": "core", "synonyms": ["strange", "weird", "odd"], "antonyms": ["normal", "ordinary", "typical"]}, {"word": "hypothetical", "pos": "adj.", "zh": "假設的", "definition": "Imagined or suggested but not necessarily real or true.", "example": "The teacher asked us a hypothetical question about living on Mars.", "mnemonic": "hypo- (under, 在...下方) + thesis (論點) → 還不夠格當作正式定理、只能放在底層當成初期前提的 → 假設的 。", "type": "core", "synonyms": ["imagined", "theoretical", "supposed"], "antonyms": ["real", "actual", "proven"]}, {"word": "delve", "pos": "v.", "zh": "探索、搜尋", "definition": "To search, especially as if by digging, in order to find information.", "example": "She delved into her pocket to find some change.", "mnemonic": "源自挖土、挖掘。引申為把手或心智伸入深處去翻箱倒櫃地 搜尋、探索資料 。", "type": "core", "synonyms": ["investigate", "explore", "dig into"], "antonyms": ["ignore", "skim", "avoid"]}, {"word": "long-winded", "pos": "adj.", "zh": "冗長的、囉唆的", "definition": "A speech or article that is too long, or uses too many words.", "example": "The meeting became long-winded and unproductive.", "mnemonic": "long (長) + winded (氣息、廢話連篇) → 一口氣講了老半天、氣很長卻毫無重點的 → 冗長囉唆的 。", "type": "core", "synonyms": ["wordy", "verbose", "rambling"], "antonyms": ["concise", "brief", "succinct"]}, {"word": "telltale", "pos": "adj.", "zh": "洩露秘密的、跡象明顯的", "definition": "Allowing a secret to become known.", "example": "She found lipstick on his shirts - the telltale sign that he was having an affair.", "mnemonic": "tell (講述) + tale (八卦故事) → 會自動把隱藏的八卦情節給抖露出來的 → 洩密、破綻明顯的 。", "type": "core", "synonyms": ["revealing", "indicative", "betraying"], "antonyms": ["hidden", "concealed", "ambiguous"]}], "refs": [{"term": "Polygraph 測謊儀", "desc": "An instrument for recording variations of several different physiological variables simultaneously, used as a lie-detector test."}, {"term": "Infrared 紅外線的", "desc": "Electromagnetic radiation with wavelengths longer than those of visible light, often used in dynamic thermal imaging scanners."}, {"term": "Electroencephalogram 腦電圖 (EEG)", "desc": "A graphic record of brain activity produced by electroencephalography tokens."}, {"term": "Paternity 父親的身分", "desc": "The legal or biological state of being a father (e.g., paternity test)."}], "mcq": [{"question": "1. What is the main idea of the video?", "options": [{"text": "A. People can always detect lies by observing body language.", "correct": false}, {"text": "B. Scientists have found a perfect way to identify lies.", "correct": false}, {"text": "C. The words people choose may reveal whether they are lying. (正確答案)", "correct": true}, {"text": "D. Most lies are harmless in everyday life.", "correct": false}]}, {"question": "2. According to the video, why are many traditional lie-detection methods unreliable?", "options": [{"text": "A. They are too difficult for investigators to use.", "correct": false}, {"text": "B. Most people naturally appear nervous when speaking.", "correct": false}, {"text": "C. Many lie-detection methods can be fooled with enough preparation. (正確答案)", "correct": true}, {"text": "D. They only work in laboratory settings.", "correct": false}]}, {"question": "3. Which of the following is mentioned as a possible sign of lying?", "options": [{"text": "A. Using fewer personal pronouns like \"I\" (正確答案)", "correct": true}, {"text": "B. Speaking louder than usual", "correct": false}, {"text": "C. Making direct eye contact", "correct": false}, {"text": "D. Smiling frequently", "correct": false}]}, {"question": "4. Which of the following is mentioned in the video as a possible characteristic of liars' language?", "options": [{"text": "A. Using more complicated and convoluted phrasing (正確答案)", "correct": true}, {"text": "B. Speaking in a highly emotional way", "correct": false}, {"text": "C. Frequently using humor and sarcasm", "correct": false}, {"text": "D. Giving long and detailed explanations", "correct": false}]}, {"question": "5. Why does the speaker discuss famous examples of lying in the video?", "options": [{"text": "A. To entertain the audience with funny stories", "correct": false}, {"text": "B. To prove that all politicians are dishonest", "correct": false}, {"text": "C. To show how language analysis can expose lies (正確答案)", "correct": true}, {"text": "D. To explain how technology detects lies", "correct": false}]}], "openq": [{"question": "Q1: Have you ever told a lie to your friend? If yes, why?", "answer": "參考回答： Yes, I have told a lie to one of my friends. At that time, I told her her dress was suited for her and said she was beautiful because I think everyone has their own style, and I don't have to judge them."}, {"question": "Q2: When you are telling a lie, do you feel guilty?", "answer": "參考回答： At that time, my answer was NO. Because I think everyone should have their own decision to choose who they want to be, that's why I encouraged her to choose the one she liked."}]}, {"id": "group5", "title": "Why We Say 'OK' - History of Etymology", "link": "https://youtu.be/1UnIDL-eHOs", "intro": "This video explores the surprising origins of OK, one of the most recognized words in the world. Most people use it every day without a second thought, yet few know that it actually started as a joke in 1830s Boston, where young intellectuals amused themselves by intentionally misspelling abbreviations. OK stood for \"oll korrect,\" a humorous misspelling of \"all correct.\" From a US presidential campaign to the rise of the telegraph, the video traces how this silly fad gradually evolved into a global staple and explains why OK, out of all such abbreviations, managed to survive and thrive across languages and cultures.", "vocab": [{"word": "fad", "pos": "n.", "zh": "一時的狂熱、短暫的流行", "definition": "Something that people are interested in for only a short period of time.", "example": "Rap music proved to be more than just a passing fad .", "mnemonic": "F anatic（瘋狂的）+ Ad vertisement（廣告）→ 像瘋狂廣告促銷一樣，來得快也去得快的 一時盲目狂熱 。", "type": "core", "synonyms": ["craze", "trend", "short-lived fashion"], "antonyms": ["classic", "tradition", "lasting practice"]}, {"word": "vernacular", "pos": "n.", "zh": "方言、本土白話", "definition": "The language spoken in a particular area or by a particular group, especially one that is not official.", "example": "The locals often communicate in their vernacular , preserving the richness of their traditional language.", "mnemonic": "verna- (本土所生的奴隸/平民) → 本土底層大眾平時習慣使用的口語說法 → 白話、方言 。", "type": "core", "synonyms": ["everyday language", "local speech", "dialect"], "antonyms": ["formal language", "standard language", "literary language"]}, {"word": "spur", "pos": "v.", "zh": "促進、使加速發生", "definition": "To make something happen faster or sooner.", "example": "The agreement is essential to spurring economic growth around the world.", "mnemonic": "利用靴子上的刺馬釘（spur）激發坐騎奔跑。引申為 加速、激勵推動 。", "type": "core", "synonyms": ["encourage", "stimulate", "prompt"], "antonyms": ["discourage", "hinder", "restrain"]}, {"word": "perpetuate", "pos": "v.", "zh": "使永存、使長存不衰", "definition": "To make something such as a bad situation, a belief, etc. continue for a long time.", "example": "This system perpetuated itself for several centuries.", "mnemonic": "per (throughout, 自始至終) + pet (seek, 追求延續) + uate → 讓某個事物狀態千秋萬代永恆維持 → 使永存 。", "type": "core", "synonyms": ["continue", "sustain", "maintain"], "antonyms": ["end", "stop", "abolish"]}, {"word": "embed", "pos": "v.", "zh": "嵌入、深植", "definition": "To fix something firmly into a substance or solid subject.", "example": "These attitudes are deeply embedded in our society.", "mnemonic": "em- (into, 進入) + bed (床、基座) → 將物體牢牢安置嵌入基礎床座內部 → 嵌入、固定 。", "type": "core", "synonyms": ["implant", "fix", "insert"], "antonyms": ["remove", "extract", "detach"]}, {"word": "affirmative", "pos": "adj.", "zh": "肯定的、贊成的", "definition": "A word or statement that means 'yes'; an agreement or a confirmation.", "example": "She answered in the affirmative .", "mnemonic": "af- (to) + firm (穩固的/確定) + ative → 表達確定、給予厚實支持的答案 → 肯定的 。", "type": "core", "synonyms": ["positive", "approving", "confirming"], "antonyms": ["negative", "denying", "opposing"]}, {"word": "definitive", "pos": "adj.", "zh": "決定性的、權威無可替代的", "definition": "Considered to be the best of its kind and almost impossible to improve.", "example": "This is the definitive guide to local history.", "mnemonic": "de- (completely) + finite (邊界/極限) → 已經幫你劃分好最終確定邊界、無庸置疑的 → 決定性的 。", "type": "core", "synonyms": ["authoritative", "final", "conclusive"], "antonyms": ["temporary", "uncertain", "provisional"]}, {"word": "reflex", "pos": "n.", "zh": "反射動作、本能反應", "definition": "An action or movement of your body that happens naturally in response to something and that you cannot control.", "example": "Almost as a reflex action, I grab my pen as the phone rings.", "mnemonic": "re- (back, 回來) + flex (bend, 彎曲) → 受到外在刺激時身體不自覺瞬間回彈彈回 → 反射動作 。", "type": "core", "synonyms": ["automatic response", "instinctive reaction", "involuntary action"], "antonyms": ["deliberate action", "conscious choice", "planned response"]}, {"word": "arguably", "pos": "adv.", "zh": "可以說是、可論證地", "definition": "Used when stating an opinion that you believe you could give solid reasons to support.", "example": "He is arguably the best actor of his generation.", "mnemonic": "argue (論證、辯論) + ably (具備能力地) → 具備充足理由可以在辯論賽中站穩腳跟地 → 可以說是 。", "type": "core", "synonyms": ["possibly", "it could be said", "reasonably"], "antonyms": ["indisputably", "certainly", "undeniably"]}], "refs": [], "mcq": [{"question": "1. Which of the following devices transmitted messages using electric pulses and Morse code?", "options": [{"text": "(A) Telephone", "correct": false}, {"text": "(B) Radio", "correct": false}, {"text": "(C) Telegraph (正確答案)", "correct": true}, {"text": "(D) Television", "correct": false}]}, {"question": "2. According to the video, why does the letter \"K\" make \"OK\" more memorable?", "options": [{"text": "(A) Because it is commonly used in English words", "correct": false}, {"text": "(B) Because it has a soft and pleasant sound", "correct": false}, {"text": "(C) Because it is uncommon and easy to recognize (正確答案)", "correct": true}, {"text": "(D) Because it represents a specific cultural meaning", "correct": false}]}, {"question": "3. Why was \"OK\" especially useful in telegraph communication?", "options": [{"text": "(A) It was long enough to avoid confusion", "correct": false}, {"text": "(B) It was easy to transmit and unlikely to be mistaken for other signals (正確答案)", "correct": true}, {"text": "(C) It represented multiple meanings in Morse code", "correct": false}, {"text": "(D) It was the only word allowed in telegraph messages", "correct": false}]}, {"question": "4. What did \"OK\" originally stand for in the 1830s?", "options": [{"text": "(A) Oll Korrect (正確答案)", "correct": true}, {"text": "(B) All Correct", "correct": false}, {"text": "(C) All Korrect", "correct": false}, {"text": "(D) Oll Correct", "correct": false}]}, {"question": "5. What does \"OK\" usually mean today?", "options": [{"text": "(A) A strong opinion", "correct": false}, {"text": "(B) A negative response", "correct": false}, {"text": "(C) A formal expression", "correct": false}, {"text": "(D) A neutral agreement or acceptance (正確答案)", "correct": true}]}], "openq": [{"question": "Q1: Originally, 'OK' started as an intentionally misspelled abbreviation, much like the internet slang we use today. Which slang terms do you think will cross language barriers and become part of our daily speech?", "answer": "參考回答： \"BTW\" (By the way) is globally recognized and used by people from all over. It could very well be the next \"OK\" in terms of universal popularity."}, {"question": "Q2: In the video, it mentioned that \"OK\" is a neutral affirmative, it doesn't convey any emotions. Have you ever experienced that feeling of impatience when someone replies with just \"OK\"? Share your experience with us.", "answer": "參考回答： If I send a long message that took a lot of time to type, I might feel angry or slighted if the other person replies with just a cold, emotionless \"OK\"."}]}, {"id": "group6", "title": "Is It Normal to Talk to Yourself? - Psychological Insight", "link": "https://youtu.be/iNyUmbmQQZg", "intro": "This video discovers why talking to yourself is not only normal but also a powerful psychological tool. Self-talk helps us regulate emotions, boost focus, and navigate daily challenges. Learn the difference between instructional, distanced, and negative self-talk. Understand how the way you speak to yourself can impact your mental health. This video explores the science behind our inner dialogue and why being kind to that inner voice matters most.", "vocab": [{"word": "blare", "pos": "v.", "zh": "發出刺耳強音、狂轟", "definition": "To make a loud, harsh sound.", "example": "The siren blared in the middle of the night.", "mnemonic": "聯想喇叭放大器大聲狂轟的刺耳尖銳音量。", "type": "core", "synonyms": ["blast", "sound loudly", "boom"], "antonyms": ["whisper", "murmur", "hush"]}, {"word": "mutter", "pos": "v.", "zh": "喃喃自語、咕噥", "definition": "To speak quietly and unclearly, often to oneself.", "example": "She muttered something under her breath.", "mnemonic": "擬聲詞。發音 mutter 聽起來就像嘴巴閉合、含糊不清發出「麥...麥...」的 碎念、咕噥聲 。", "type": "core", "synonyms": ["mumble", "murmur", "grumble"], "antonyms": ["shout", "announce", "speak clearly"]}, {"word": "stigmatize", "pos": "v.", "zh": "污名化、烙下恥辱印記", "definition": "To treat someone unfairly by labeling them in a negative, shameful way.", "example": "People with disabilities should not be stigmatized .", "mnemonic": "stigma（古希臘烙在逃跑奴隸身上的恥辱烙印）+ ize (動詞尾) → 往某人身上貼羞辱標籤 → 污名化 。", "type": "core", "synonyms": ["shame", "label negatively", "discredit"], "antonyms": ["respect", "accept", "normalize"]}, {"word": "spontaneous", "pos": "adj.", "zh": "自發的、自然產生的", "definition": "Happening naturally or suddenly, without planning.", "example": "They made a spontaneous decision to go to the beach.", "mnemonic": "源自 sponte（出於個體自身意志、不由外力支配）。指事情 完全自然發生的 。", "type": "core", "synonyms": ["unplanned", "impulsive", "natural"], "antonyms": ["planned", "deliberate", "scheduled"]}, {"word": "collegiate", "pos": "adj.", "zh": "大學的、學院的", "definition": "Related to a college or university.", "example": "He enjoys the collegiate atmosphere on campus.", y", "pos": "n.", "zh": "獨特癖好、怪癖", "definition": "A strange or unusual habit, way of behaving, or distinct feature that someone has.", "example": "She often cracks her knuckles when she's speaking - it's one of her little idiosyncrasies .", "mnemonic": "idio- (private/personal, 個人的) + syn (together) + krasis (mixture, 調和) → 某人體內獨家調配出來、專屬於他個人的奇特古怪行事特質 → 特異癖好 。", "type": "core", "synonyms": ["quirk", "peculiarity", "odd habit"], "antonyms": ["normality", "conformity", "standard behavior"]}, {"word": "revelation", "pos": "n.", "zh": "啟示、被揭露的真相", "definition": "The act of making something known that was secret, or a shocking fact made known.", "example": "His wife divorced him after the revelation that he was having an affair.", "mnemonic": "源自 reveal（揭露、展現）。把原本蓋在秘密上方的面紗扯開、大白於天下 → 揭露、啟示 。", "type": "core", "synonyms": ["disclosure", "unveiling", "discovery"], "antonyms": ["concealment", "secret", "cover-up"]}, {"word": "accumulation", "pos": "n.", "zh": "累積", "definition": "An amount of something that has been collected over a span of time.", "example": "Despite this accumulation of evidence, the government persisted in doing nothing.", "mnemonic": "ac- (to) + cumul (heap, 堆積，如 cumulus 積雲) + ation → 東西不斷往上堆疊成高聳的小山丘 → 累積、積聚 。", "type": "core", "synonyms": ["buildup", "collection", "pileup"], "antonyms": ["reduction", "depletion", "dispersal"]}, {"word": "impending", "pos": "adj.", "zh": "即將發生的、迫在眉睫的", "definition": "Used to refer to an event, usually unpleasant, that is going to happen very soon.", "example": "The player announced his impending retirement from international football.", "mnemonic": "im- (upon, 逼近) + pend (hang, 懸掛) → 某個烏雲或危機沉甸甸地垂直懸掛在你的頭頂上方 → 即將到來的 。", "type": "core", "synonyms": ["approaching", "imminent", "forthcoming"], "antonyms": ["distant", "past", "unlikely"]}], "refs": [{"term": "Anterior cingulate cortex 前扣帶皮層", "desc": "A structural brain hub involved in error detection, conflict monitoring, and triggering cognitive error signaling loops."}], "mcq": [{"question": "1. What's the main idea of the video?", "options": [{"text": "(A) Showing how to deal with memory loss.", "correct": false}, {"text": "(B) Explaining a state when you have trouble remembering something. (正確答案)", "correct": true}, {"text": "(C) Demonstrating the functions of our brain when you can't recall a word.", "correct": false}, {"text": "(D) Sharing a study of what people are most likely to forget in certain conditions.", "correct": false}]}, {"question": "2. What's true about the phenomenon \"tip-of-the-tongue\"?", "options": [{"text": "(A) It means something you'll never recall.", "correct": false}, {"text": "(B) Stressful test conditions increase tip-of-the-tongue experiences. (正確答案)", "correct": true}, {"text": "(C) People who learned their second language at an early age had more tip-of-the-tongue stumbles.", "correct": false}, {"text": "(D) It isn't relevant with environmental conditions.", "correct": false}]}, {"question": "3. According to the video, in which situation does the tip-of-the-tongue moment most likely NOT occur?", "options": [{"text": "(A) When you are trying to share a part of the rhythm from a 2015 Tik Tok song with your friend.", "correct": false}, {"text": "(B) When you are doing a math test that affects which college you may go to.", "correct": false}, {"text": "(C) When you're trying to summon the name of one of your classmates who has a talent for playing the violin.", "correct": false}, {"text": "(D) When you try to recall the career of someone you hate by looking at your instagram followers list. (正確答案)", "correct": true}]}, {"question": "4. Why is it easier for people who speak multiple languages to have more tip-of-the-tongue moments?", "options": [{"text": "(A) They know different languages to describe the same thing. (正確答案)", "correct": true}, {"text": "(B) They speak fluently after practice.", "correct": false}, {"text": "(C) They learned a second language before the age of five.", "correct": false}, {"text": "(D) They hear a word too many times.", "correct": false}]}, {"question": "5. According to the video, what method can we use for getting rid of the tip-of-the-tongue feeling?", "options": [{"text": "(A) Ask someone who might share the same memory with you.", "correct": false}, {"text": "(B) Take a cool bath and rest a little bit.", "correct": false}, {"text": "(C) Force yourself to recall something in a limited amount of time.", "correct": false}, {"text": "(D) Put associated memories and letters together to check if the memory comes out. (正確答案)", "correct": true}]}], "openq": [{"question": "Q1: The \"tip-of-the-tongue\" states may happen in what situation and what do they reveal about how memory works?", "answer": "參考回答： \"Tip-of-the-tongue\" states often happen when we are trying to recall a word we know, such as someone's name, a difficult vocabulary word, or something we haven't used for a long time. They may also occur when we are nervous or under pressure, like during a test or a presentation. These situations reveal that memory does not work as a single system. Even if we cannot fully recall a word, we might still remember parts of it, like the first letter or its abstract meaning."}, {"question": "Q2: How can experiencing a \"tip-of-the-tongue\" moment actually be helpful for learning or memory improvement?", "answer": "參考回答： It can strengthen memory because trying to recall something makes the brain work harder, reinforcing synaptic paths. (Conversely, some might argue that it's not helpful at all, because it can cause severe frustration and interrupt deep thinking channels.)"}]}]</script>

  const ant = Array.isArray(v.antonyms) ? v.antonyms.join(', ') : (v.antonyms || '');
  const synantHtml = `<div class="synant"><span><b>Synonyms：</b>${escapeHtml(syn || '—')}</span><span class="anti"><b>Antonyms：</b>${escapeHtml(ant || '—')}</span></div>`;
  return `<article class="card" data-index="${i}"><div class="card-inner"><div class="face front"><div class="tagrow"><span class="tag">${escapeHtml(group().title.split(' - ')[0])}</span><span class="tag">核心單字</span></div><div class="word">${escapeHtml(v.word)}</div><div class="pos">${escapeHtml(v.pos || '')}</div><div class="card-actions"><button type="button" class="iconbtn speak" data-word="${escapeHtml(v.word)}">🔊 發音</button><button type="button" class="iconbtn flip">翻面</button></div><div class="hint">先自己回想中文與用法，再翻面確認</div></div><div class="face back"><div class="zh">${escapeHtml(v.zh)}</div><div class="def"><b>Definition：</b>${escapeHtml(v.definition)}</div>${synantHtml}<div class="ex"><b>Example：</b>${escapeHtml(v.example)}</div><div class="memo"><b>記憶法：</b>${escapeHtml(v.mnemonic || '把單字拆成音節，搭配例句場景主動回想。')}</div><div class="card-actions"><button type="button" class="iconbtn speak" data-word="${escapeHtml(v.word)}">🔊 再聽一次</button><button type="button" class="iconbtn flip">回正面</button></div></div></div></article>`; }
function renderVocab(list=null) {
  const g=group(); const items=list || g.vocab; vocabOrder = items.slice();
  $('#vocabGrid').innerHTML = items.map(cardHtml).join('') || '<p>沒有單字資料。</p>';
  $('#studyStatus').textContent = `${g.title}｜${items.length} words`;
}
function renderRefs() { $('#refGrid').innerHTML = group().refs.map(r=>`<div class="ref"><b>${escapeHtml(r.term)}</b><p>${escapeHtml(r.desc)}</p></div>`).join('') || '<p>沒有參考詞彙。</p>'; }
function renderQuiz() {
  $('#quizList').innerHTML = group().mcq.map((q,qi)=>`<div class="q"><h4>${escapeHtml(q.question)}</h4>${q.options.map((o,oi)=>`<button type="button" class="opt" data-correct="${o.correct}">${escapeHtml(o.text)}</button>`).join('')}<div class="answer">正確答案已以綠色標示。點錯也沒關係，請重新讀題幹關鍵字。</div></div>`).join('') || '<p>沒有選擇題。</p>';
}
function renderOpen() { $('#openList').innerHTML = group().openq.map(q=>`<div class="q"><h4>${escapeHtml(q.question)}</h4><button type="button" class="btn reveal">顯示參考回答</button><div class="answer">${escapeHtml(q.answer)}</div></div>`).join('') || '<p>沒有申論題。</p>'; }
function renderAll() { renderNav(); renderHeader(); renderVocab(); renderRefs(); renderQuiz(); renderOpen(); $('#search').value=''; $$('.tab').forEach((t,i)=>t.classList.toggle('active', i===0)); $$('.section').forEach(s=>s.classList.toggle('active', s.id==='section-vocab')); window.scrollTo({top:0,behavior:'smooth'}); }
function filterVocab() {
  const q=$('#search').value.trim().toLowerCase(); const g=group();
  if(!q) return renderVocab(g.vocab);
  renderVocab(g.vocab.filter(v => [v.word,v.pos,v.zh,v.definition,v.example,v.mnemonic,(v.synonyms||[]).join(' '),(v.antonyms||[]).join(' ')].join(' ').toLowerCase().includes(q)));
}
// Event delegation
$('#nav').addEventListener('click', e => { const b=e.target.closest('button[data-id]'); if(!b) return; current=b.dataset.id; renderAll(); });
document.body.addEventListener('click', e => {
  const speakBtn=e.target.closest('.speak'); if(speakBtn) { e.stopPropagation(); speak(speakBtn.dataset.word); return; }
  const flipBtn=e.target.closest('.flip'); if(flipBtn) { e.stopPropagation(); flipBtn.closest('.card')?.classList.toggle('flipped'); return; }
  const card=e.target.closest('.card'); if(card && !e.target.closest('button')) { card.classList.toggle('flipped'); return; }
  const opt=e.target.closest('.opt'); if(opt) { const q=opt.closest('.q'); $$('.opt',q).forEach(o=>o.classList.add('revealed')); $('.answer',q)?.classList.add('show'); if(opt.dataset.correct !== 'true') opt.classList.add('wrong'); return; }
  const rev=e.target.closest('.reveal'); if(rev) { $('.answer',rev.closest('.q'))?.classList.toggle('show'); return; }
});
$$('.tab').forEach(tab=>tab.addEventListener('click',()=>{ $$('.tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); $$('.section').forEach(s=>s.classList.remove('active')); $('#section-'+tab.dataset.tab).classList.add('active'); }));
$('#toggleZh').addEventListener('click',()=>document.body.classList.toggle('hidden-zh'));
$('#flipAll').addEventListener('click',()=>{ const cards=$$('.card'); const any=cards.some(c=>c.classList.contains('flipped')); cards.forEach(c=>c.classList.toggle('flipped',!any)); });
$('#search').addEventListener('input', filterVocab);
$('#shuffle').addEventListener('click',()=>{ const arr=group().vocab.slice().sort(()=>Math.random()-.5); renderVocab(arr); });
$('#reset').addEventListener('click',()=>renderVocab(group().vocab));
$('#speakAll').addEventListener('click',()=>{ const words=vocabOrder.slice(0,12).map(v=>v.word).join('. '); speak(words); });
renderAll();
})();
</script>

if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => {
      console.warn('Service worker registration failed:', err);
    });
  });
}
</script>
